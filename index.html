 <!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cristina Dindins Gourmet</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        .card-zoom:active { transform: scale(0.96); transition: 0.2s; }
        /* Estilo para produto sem estoque */
        .esgotado { filter: grayscale(1) brightness(0.7); opacity: 0.6; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyA6LYjuCkIM6FVW2TeOFLXxGx1xtgk6DYk",
            authDomain: "dindin-de-cristina.firebaseapp.com",
            databaseURL: "https://dindin-de-cristina-default-rtdb.firebaseio.com",
            projectId: "dindin-de-cristina",
            storageBucket: "dindin-de-cristina.firebasestorage.app",
            messagingSenderId: "370083027989",
            appId: "1:370083027989:web:caa4def3a4f14b6746421c"
        };
        
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const LISTA_INICIAL = [
            { id: 1, nome: "CHOCOLATE", preco: 2.50, categoria: "Gourmet", imagem: "https://i.postimg.cc/J45Yn8KZ/geladinho-cremoso-de-chocolate.jpg", ativo: true, estoque: 20 },
            { id: 2, nome: "OREO", preco: 2.50, categoria: "Gourmet", imagem: "https://i.postimg.cc/9MsKGBqr/e52b67c6b7e4dec9a86f1dbdd924f216.jpg", ativo: true, estoque: 20 },
            { id: 3, nome: "NINHO COM NUTELLA", preco: 2.50, categoria: "Gourmet", imagem: "https://i.postimg.cc/GmpKmy4w/Geladinho-gourmet-de-Nutella.jpg", ativo: true, estoque: 20 },
            { id: 4, nome: "PAÇOCA", preco: 2.50, categoria: "Gourmet", imagem: "https://i.postimg.cc/CxwtH5dX/geladinho-gourmet-de-pacoca-9112-orig.jpg", ativo: true, estoque: 20 },
            { id: 5, nome: "CREME", preco: 2.50, categoria: "Gourmet", imagem: "https://i.postimg.cc/Qd5LSwJ2/creme.jpg", ativo: true, estoque: 20 },
            { id: 6, nome: "PUDIM", preco: 2.50, categoria: "Gourmet", imagem: "https://i.postimg.cc/tTFtMdMk/hq720.jpg", ativo: true, estoque: 20 },
            { id: 7, nome: "MENTA COM CHOCOLATE", preco: 2.50, categoria: "Gourmet", imagem: "https://i.postimg.cc/Mpw6tkFv/030aa285c40e7b6026bf775ebfc8c8f0.jpg", ativo: true, estoque: 20 },
            { id: 8, nome: "PRESTÍGIO", preco: 2.50, categoria: "Gourmet", imagem: "https://i.postimg.cc/NFTt7b8t/9e6c20646292c1d72705e112e9b0a068.jpg", ativo: true, estoque: 20 },
            { id: 9, nome: "ABACAXI", preco: 2.50, categoria: "Gourmet", imagem: "https://i.postimg.cc/jdHKDgdk/cd3ce0177b664e89e16af338a5e779b6.jpg", ativo: true, estoque: 20 },
            { id: 10, nome: "MORANGO COM CHOCO", preco: 2.50, categoria: "Gourmet", imagem: "https://i.postimg.cc/cHtG0TbM/da464d5de60e279c4d5f50c2defe609e.jpg", ativo: true, estoque: 20 },
            { id: 11, nome: "COCO COM CHOCO", preco: 2.50, categoria: "Gourmet", imagem: "https://i.postimg.cc/Qdf27RLf/0327658d3ab61101ceb2cda6c38cdbe5.jpg", ativo: true, estoque: 20 },
            { id: 12, nome: "MARACUJÁ COM CHOCO", preco: 2.50, categoria: "Gourmet", imagem: "https://i.postimg.cc/Fsm8B9N0/f0378b220c66224ed19cbc3fe72abd5e.jpg", ativo: true, estoque: 20 },
            { id: 13, nome: "LEITE CONDENSADO", preco: 2.50, categoria: "Gourmet", imagem: "https://i.postimg.cc/fRqPymmW/bde83b5f0ca473295a7e3a05458967b6.jpg", ativo: true, estoque: 20 },
            { id: 14, nome: "AÇAÍ", preco: 2.50, categoria: "Gourmet", imagem: "https://i.postimg.cc/nLQ3L5ns/600967d08a4995dc94e62c649d3a5e4b.jpg", ativo: true, estoque: 20 },
            { id: 15, nome: "MOUSSE DE LIMÃO", preco: 2.50, categoria: "Gourmet", imagem: "https://i.postimg.cc/WbW8wj3g/d9a3fce947626b9648b13e3e1abda160.jpg", ativo: true, estoque: 20 },
            { id: 16, nome: "NATA GOIABADA", preco: 2.50, categoria: "Gourmet", imagem: "https://i.postimg.cc/Ssf72b3q/98d758a2d76089c9a6c74f540e72fb5f.jpg", ativo: true, estoque: 20 },
            { id: 17, nome: "TUTTI FRUTTI", preco: 2.50, categoria: "Gourmet", imagem: "https://i.postimg.cc/D0mJvVK5/maxresdefault.jpg", ativo: true, estoque: 20 }
        ];

        function App() {
            const [produtos, setProdutos] = useState([]);
            const [cor, setCor] = useState(localStorage.getItem('@cor_v19') || 'pink');
            const [carrinho, setCarrinho] = useState([]);
            const [modal, setModal] = useState(false);
            const [admAberto, setAdmAberto] = useState(false);
            const [cliques, setCliques] = useState(0);
            const [form, setForm] = useState({ nome: '', preco: '2.50', categoria: 'Gourmet', imagem: '', estoque: '20', ativo: true });
            const [cliente, setCliente] = useState({ nome: '', end: '', pgto: 'Pix' });

            useEffect(() => {
                const produtosRef = db.ref('produtos');
                produtosRef.on('value', (snapshot) => {
                    const data = snapshot.val();
                    if (data) setProdutos(Object.values(data));
                    else db.ref('produtos').set(LISTA_INICIAL);
                });
                return () => produtosRef.off();
            }, []);

            const t = {
                pink: { bg: '#fff5f7', primary: 'bg-pink-600', text: 'text-pink-600', btn: 'bg-pink-600' },
                blue: { bg: '#f0f9ff', primary: 'bg-blue-600', text: 'text-blue-600', btn: 'bg-blue-600' },
                purple: { bg: '#f5f3ff', primary: 'bg-purple-600', text: 'text-purple-600', btn: 'bg-purple-600' },
                black: { bg: '#fafafa', primary: 'bg-zinc-900', text: 'text-zinc-900', btn: 'bg-zinc-900' }
            }[cor];

            const totalQtd = carrinho.reduce((acc, i) => acc + i.qtd, 0);
            const totalValor = carrinho.reduce((acc, i) => acc + (i.preco * i.qtd), 0);
            const delivery = totalQtd >= 5;

            // CORREÇÃO DA SENHA AQUI
            const handleHeaderClick = () => {
                const novoContador = cliques + 1;
                setCliques(novoContador);
                if (novoContador >= 5) {
                    const pass = prompt("Senha Administrativa:");
                    if (pass === "142345") {
                        setAdmAberto(true);
                    } else if (pass !== null) {
                        alert("Senha incorreta!");
                    }
                    setCliques(0);
                }
            };

            const salvarSabor = () => {
                if(!form.nome || !form.imagem) return alert("Preencha tudo!");
                const id = Date.now();
                db.ref('produtos/' + id).set({ ...form, id, preco: parseFloat(form.preco), estoque: parseInt(form.estoque) });
                setForm({ nome: '', preco: '2.50', categoria: 'Gourmet', imagem: '', estoque: '20', ativo: true });
            };

            const enviarPedido = () => {
                const itens = carrinho.map(i => `• ${i.qtd}x ${i.nome}`).join('\n');
                const local = delivery ? `\n*Endereço:* ${cliente.end}` : `\n*Retirada:* Travessa N. Sra. da Conceição, 77, ponto de referência: Diego cds.`;
                const txt = `*PEDIDO DINDIN*\n\n*Cliente:* ${cliente.nome}${local}\n\n*Itens:*\n${itens}\n\n*Total:* R$ ${totalValor.toFixed(2)}`;
                window.open(`https://wa.me/5583998539916?text=${encodeURIComponent(txt)}`);
            };

            return (
                <div style={{ backgroundColor: t.bg, minHeight: '100vh' }}>
                    <header className={`${t.primary} text-white p-6 rounded-b-[40px] shadow-lg text-center`} onClick={handleHeaderClick}>
                        <h1 className="text-xl font-black uppercase italic">Cristina Dindins Gourmet</h1>
                    </header>

                    <div className="p-4 grid grid-cols-2 gap-4 max-w-2xl mx-auto pb-24">
                        {produtos.filter(p => p.ativo).map(p => (
                            <div key={p.id} className={`bg-white p-2 rounded-[30px] shadow-sm border border-pink-50 card-zoom ${p.estoque <= 0 ? 'esgotado' : ''}`}>
                                <img src={p.imagem} className="w-full h-32 object-cover rounded-[25px] mb-2" />
                                <h2 className="text-[10px] font-black uppercase px-2 truncate text-gray-400">{p.nome}</h2>
                                <p className={`${t.text} font-black text-lg px-2`}>R$ {p.preco.toFixed(2)}</p>
                                <button disabled={p.estoque <= 0} onClick={() => {
                                    const ex = carrinho.find(c => c.id === p.id);
                                    setCarrinho(ex ? carrinho.map(i => i.id === p.id ? {...i, qtd: i.qtd+1} : i) : [...carrinho, {...p, qtd: 1}]);
                                }} className={`w-full py-3 mt-2 rounded-xl text-[10px] font-black text-white ${p.estoque <= 0 ? 'bg-gray-400' : t.btn}`}>
                                    {p.estoque <= 0 ? 'SEM ESTOQUE' : 'ADICIONAR'}
                                </button>
                            </div>
                        ))}
                    </div>

                    {totalQtd > 0 && !modal && (
                        <button onClick={() => setModal(true)} className={`fixed bottom-6 right-6 ${t.btn} text-white p-5 rounded-full shadow-2xl z-50 font-black animate__animated animate__bounceIn`}>🛒 {totalQtd}</button>
                    )}

                    {modal && (
                        <div className="fixed inset-0 bg-black/80 z-[60] flex items-end">
                            <div className="bg-white w-full rounded-t-[40px] p-6 max-h-[90vh] overflow-y-auto">
                                <button onClick={()=>setModal(false)} className="w-full text-gray-400 text-[10px] font-black uppercase mb-4 text-center">Fechar Carrinho</button>
                                {carrinho.map(item => (
                                    <div key={item.id} className="flex justify-between items-center bg-gray-50 p-3 rounded-2xl mb-2">
                                        <span className="text-[10px] font-black">{item.nome}</span>
                                        <span className="font-black text-pink-600">x{item.qtd}</span>
                                    </div>
                                ))}
                                <input type="text" placeholder="SEU NOME" className="w-full p-4 mt-4 bg-gray-50 rounded-xl font-black text-[10px] outline-none" onChange={e=>setCliente({...cliente, nome: e.target.value.toUpperCase()})} />
                                {delivery && <input type="text" placeholder="ENDEREÇO COMPLETO" className="w-full p-4 mt-2 border-2 border-green-500 rounded-xl font-black text-[10px] outline-none" onChange={e=>setCliente({...cliente, end: e.target.value.toUpperCase()})} />}
                                <button onClick={enviarPedido} className="w-full bg-green-500 text-white p-5 mt-4 rounded-2xl font-black uppercase text-[10px]">Enviar para WhatsApp</button>
                            </div>
                        </div>
                    )}

                    {admAberto && (
                        <div className="fixed inset-0 bg-white z-[100] p-6 overflow-y-auto">
                            <div className="flex justify-between items-center mb-6">
                                <h2 className="font-black text-pink-600 uppercase italic">Painel de Controle</h2>
                                <button onClick={() => setAdmAberto(false)} className="bg-pink-600 text-white px-4 py-2 rounded-xl font-black text-[10px]">FECHAR</button>
                            </div>
                            <div className="bg-pink-50 p-5 rounded-[30px] mb-8 space-y-3">
                                <input type="text" placeholder="NOME DO SABOR" value={form.nome} onChange={e=>setForm({...form, nome: e.target.value.toUpperCase()})} className="w-full p-3 rounded-xl text-[10px] font-black" />
                                <div className="grid grid-cols-2 gap-2">
                                    <input type="number" placeholder="PREÇO" value={form.preco} onChange={e=>setForm({...form, preco: e.target.value})} className="p-3 rounded-xl text-[10px]" />
                                    <input type="number" placeholder="ESTOQUE" value={form.estoque} onChange={e=>setForm({...form, estoque: e.target.value})} className="p-3 rounded-xl text-[10px]" />
                                </div>
                                <input type="text" placeholder="URL DA IMAGEM" value={form.imagem} onChange={e=>setForm({...form, imagem: e.target.value})} className="w-full p-3 rounded-xl text-[10px]" />
                                <button onClick={salvarSabor} className="w-full bg-pink-600 text-white py-4 rounded-xl font-black text-[10px]">ADICIONAR NOVO SABOR</button>
                            </div>
                            <div className="space-y-2">
                                {produtos.map(p => (
                                    <div key={p.id} className="flex items-center gap-3 p-3 bg-gray-50 rounded-2xl">
                                        <img src={p.imagem} className="w-10 h-10 rounded-lg object-cover" />
                                        <div className="flex-1"><p className="text-[9px] font-black uppercase">{p.nome}</p><p className="text-[8px]">QTD: {p.estoque}</p></div>
                                        <button onClick={() => db.ref('produtos/' + p.id).update({ ativo: !p.ativo })}>{p.ativo ? '✅' : '❌'}</button>
                                        <button onClick={() => {if(confirm("Apagar?")) db.ref('produtos/' + p.id).remove()}}>🗑️</button>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
