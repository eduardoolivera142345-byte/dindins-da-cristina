<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cristina Dindins Gourmet</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        .card-zoom:active { transform: scale(0.96); transition: 0.2s; }
        .esgotado { filter: grayscale(1) brightness(0.7); opacity: 0.6; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyA6LYjuCkIM6FVW2TeOFLXxGx1xtgk6DYk",
            authDomain: "dindin-de-cristina.firebaseapp.com",
            databaseURL: "https://dindin-de-cristina-default-rtdb.firebaseio.com",
            projectId: "dindin-de-cristina",
            storageBucket: "dindin-de-cristina.firebasestorage.app",
            messagingSenderId: "370083027989",
            appId: "1:370083027989:web:caa4def3a4f14b6746421c"
        };
        
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function App() {
            const [produtos, setProdutos] = useState([]);
            const [cor, setCor] = useState(localStorage.getItem('@cor_v19') || 'pink');
            const [carrinho, setCarrinho] = useState([]);
            const [modal, setModal] = useState(false);
            const [admAberto, setAdmAberto] = useState(false);
            const [cliques, setCliques] = useState(0);
            const [form, setForm] = useState({ nome: '', preco: '2.50', categoria: 'Gourmet', imagem: '', estoque: '20', ativo: true });
            const [cliente, setCliente] = useState({ nome: '', end: '', pgto: 'Pix', troco: '' });

            useEffect(() => {
                const produtosRef = db.ref('produtos');
                produtosRef.on('value', (snapshot) => {
                    const data = snapshot.val();
                    if (data) setProdutos(Object.values(data));
                });
                return () => produtosRef.off();
            }, []);

            const t = {
                pink: { bg: '#fff5f7', primary: 'bg-pink-600', text: 'text-pink-600', btn: 'bg-pink-600' },
                blue: { bg: '#f0f9ff', primary: 'bg-blue-600', text: 'text-blue-600', btn: 'bg-blue-600' },
                purple: { bg: '#f5f3ff', primary: 'bg-purple-600', text: 'text-purple-600', btn: 'bg-purple-600' },
                black: { bg: '#fafafa', primary: 'bg-zinc-900', text: 'text-zinc-900', btn: 'bg-zinc-900' }
            }[cor];

            const totalQtd = carrinho.reduce((acc, i) => acc + i.qtd, 0);
            const totalValor = carrinho.reduce((acc, i) => acc + (i.preco * i.qtd), 0);
            const delivery = totalQtd >= 5;

            const pixCodigo = `00020126330014BR.GOV.BCB.PIX011198153351452040000530398654${totalValor.toFixed(2).length.toString().padStart(2,'0')}${totalValor.toFixed(2)}5802BR5925CRISTINA MARTIAS DE OLIVE6011BRASIL62070503***6304`;

            const handleHeaderClick = () => {
                const novo = cliques + 1;
                setCliques(novo);
                if (novo >= 5) {
                    const p = prompt("Senha ADM:");
                    if (p === "142345") setAdmAberto(true);
                    setCliques(0);
                }
            };

            const alterarQtd = (id, delta) => {
                const item = carrinho.find(c => c.id === id);
                const prodOriginal = produtos.find(p => p.id === id);
                if (delta > 0 && item.qtd >= prodOriginal.estoque) return alert("Limite de estoque atingido!");
                
                const novoCarrinho = carrinho.map(c => c.id === id ? { ...c, qtd: c.qtd + delta } : c).filter(c => c.qtd > 0);
                setCarrinho(novoCarrinho);
            };

            const enviarPedido = () => {
                if (!cliente.nome) return alert("Digite seu nome!");
                if (delivery && !cliente.end) return alert("Digite o endereço para entrega!");
                
                const itens = carrinho.map(i => `• ${i.qtd}x ${i.nome}`).join('\n');
                const local = delivery ? `\n*Endereço:* ${cliente.end}` : `\n*Retirada:* Travessa N. Sra. da Conceição, 77 (Ref: Diego CDs)`;
                const trocoMsg = cliente.pgto === 'Dinheiro' && cliente.troco ? `\n*Troco para:* R$ ${cliente.troco}` : '';
                const txt = `*PEDIDO DINDIN*\n\n*Cliente:* ${cliente.nome}${local}\n\n*Itens:*\n${itens}\n\n*Total:* R$ ${totalValor.toFixed(2)}\n*Pagamento:* ${cliente.pgto}${trocoMsg}`;
                window.open(`https://wa.me/5583998539916?text=${encodeURIComponent(txt)}`);
            };

            return (
                <div style={{ backgroundColor: t.bg, minHeight: '100vh' }}>
                    <header className={`${t.primary} text-white p-6 rounded-b-[40px] shadow-lg text-center`} onClick={handleHeaderClick}>
                        <h1 className="text-xl font-black uppercase italic tracking-tighter">Cristina Dindins Gourmet</h1>
                        <p className="text-[10px] font-bold opacity-90 uppercase mt-1 italic">Travessa Nossa Senhora da Conceição, nº 77</p>
                    </header>

                    <div className="p-4 grid grid-cols-2 gap-4 max-w-2xl mx-auto pb-24">
                        {produtos.filter(p => p.ativo).map(p => (
                            <div key={p.id} className={`bg-white p-2 rounded-[30px] shadow-sm border border-pink-50 card-zoom ${p.estoque <= 0 ? 'esgotado' : ''}`}>
                                <img src={p.imagem} className="w-full h-32 object-cover rounded-[25px] mb-2" />
                                <h2 className="text-[10px] font-black uppercase px-2 truncate text-gray-400">{p.nome}</h2>
                                <p className={`${t.text} font-black text-lg px-2`}>R$ {p.preco.toFixed(2)}</p>
                                <button disabled={p.estoque <= 0} onClick={() => {
                                    const ex = carrinho.find(c => c.id === p.id);
                                    if(ex) alterarQtd(p.id, 1);
                                    else setCarrinho([...carrinho, {...p, qtd: 1}]);
                                }} className={`w-full py-3 mt-2 rounded-xl text-[10px] font-black text-white ${p.estoque <= 0 ? 'bg-gray-400' : t.btn}`}>
                                    {p.estoque <= 0 ? 'ESGOTADO' : 'ADICIONAR'}
                                </button>
                            </div>
                        ))}
                    </div>

                    {totalQtd > 0 && !modal && (
                        <button onClick={() => setModal(true)} className={`fixed bottom-6 right-6 ${t.btn} text-white p-5 rounded-full shadow-2xl z-50 font-black`}>🛒 {totalQtd}</button>
                    )}

                    {modal && (
                        <div className="fixed inset-0 bg-black/80 z-[60] flex items-end">
                            <div className="bg-white w-full rounded-t-[40px] p-6 max-h-[90vh] overflow-y-auto">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="font-black text-pink-600 uppercase italic">Carrinho</h2>
                                    <button onClick={()=>setModal(false)} className="text-gray-400 text-[10px] font-black">FECHAR</button>
                                </div>

                                {carrinho.map(item => (
                                    <div key={item.id} className="flex items-center gap-3 bg-gray-50 p-3 rounded-2xl mb-2 border border-pink-50">
                                        <span className="flex-1 text-[10px] font-black uppercase">{item.nome}</span>
                                        <div className="flex items-center gap-2">
                                            <button onClick={()=>alterarQtd(item.id, -1)} className="w-8 h-8 bg-white rounded-full border shadow-sm font-black">-</button>
                                            <span className="font-black text-sm">{item.qtd}</span>
                                            <button onClick={()=>alterarQtd(item.id, 1)} className="w-8 h-8 bg-white rounded-full border shadow-sm font-black">+</button>
                                        </div>
                                    </div>
                                ))}

                                <div className="mt-6 space-y-3">
                                    <input type="text" placeholder="SEU NOME" className="w-full p-4 rounded-xl font-black text-[10px] bg-gray-50 outline-none" onChange={e=>setCliente({...cliente, nome: e.target.value.toUpperCase()})} />
                                    
                                    {delivery ? (
                                        <input type="text" placeholder="ENDEREÇO PARA ENTREGA" className="w-full p-4 rounded-xl border-2 border-green-500 font-black text-[10px] outline-none" onChange={e=>setCliente({...cliente, end: e.target.value.toUpperCase()})} />
                                    ) : (
                                        <div className="p-4 bg-orange-50 text-orange-600 rounded-2xl border border-orange-200">
                                            <p className="text-[10px] font-black uppercase mb-1">Aviso de Retirada</p>
                                            <p className="text-[9px] font-bold italic leading-tight">Retirar em: Travessa Nossa Senhora da Conceição, n° 77 (Ref: Diego CDs). Delivery disponível apenas para 5 ou mais dindins.</p>
                                        </div>
                                    )}

                                    <div className="flex gap-2">
                                        {['Pix', 'Dinheiro'].map(m => (
                                            <button key={m} onClick={()=>setCliente({...cliente, pgto: m})} className={`flex-1 py-3 rounded-xl font-black text-[10px] ${cliente.pgto === m ? t.btn+' text-white' : 'bg-gray-100 text-gray-400'}`}>{m}</button>
                                        ))}
                                    </div>

                                    {cliente.pgto === 'Dinheiro' && <input type="number" placeholder="TROCO PARA QUANTO?" className="w-full p-4 rounded-xl border font-black text-[10px] outline-none" onChange={e=>setCliente({...cliente, troco: e.target.value})} />}

                                    {cliente.pgto === 'Pix' && (
                                        <div className="text-center bg-gray-50 p-4 rounded-3xl border border-gray-100">
                                            <img src={`https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(pixCodigo)}`} className="mx-auto mb-2 border-4 border-white rounded-xl shadow-sm" />
                                            <p className="text-[10px] font-black text-pink-600 mb-1 uppercase tracking-widest">Valor Total: R$ {totalValor.toFixed(2)}</p>
                                            <button onClick={() => {navigator.clipboard.writeText(pixCodigo); alert("Pix Copiado!")}} className="text-[9px] font-black border px-4 py-2 rounded-full bg-white uppercase">📋 Copiar Código Pix</button>
                                        </div>
                                    )}
                                </div>

                                <div className="flex justify-between items-center mt-8">
                                    <span className={`text-2xl font-black ${t.text}`}>R$ {totalValor.toFixed(2)}</span>
                                    <button onClick={enviarPedido} className="bg-green-500 text-white px-8 py-4 rounded-2xl font-black uppercase text-[10px] shadow-lg">Finalizar Pedido</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {admAberto && (
                        <div className="fixed inset-0 bg-white z-[100] p-6 overflow-y-auto">
                            <div className="flex justify-between items-center mb-6 border-b pb-4">
                                <h2 className="text-pink-600 font-black uppercase italic">Gestão de Sabores</h2>
                                <button onClick={()=>setAdmAberto(false)} className="bg-pink-600 text-white px-4 py-2 rounded-xl font-black text-[10px]">SAIR</button>
                            </div>
                            <div className="bg-pink-50 p-5 rounded-[30px] mb-8 space-y-3">
                                <input type="text" placeholder="NOME" value={form.nome} onChange={e=>setForm({...form, nome: e.target.value.toUpperCase()})} className="w-full p-3 rounded-xl text-[10px] font-black outline-none" />
                                <div className="grid grid-cols-2 gap-2">
                                    <input type="number" placeholder="PREÇO" value={form.preco} onChange={e=>setForm({...form, preco: e.target.value})} className="p-3 rounded-xl text-[10px] font-black" />
                                    <input type="number" placeholder="ESTOQUE" value={form.estoque} onChange={e=>setForm({...form, estoque: e.target.value})} className="p-3 rounded-xl text-[10px] font-black" />
                                </div>
                                <input type="text" placeholder="URL DA FOTO" value={form.imagem} onChange={e=>setForm({...form, imagem: e.target.value})} className="w-full p-3 rounded-xl text-[10px] font-black outline-none" />
                                <button onClick={() => {
                                    const id = Date.now();
                                    db.ref('produtos/'+id).set({...form, id, preco: parseFloat(form.preco), estoque: parseInt(form.estoque)});
                                    setForm({ nome: '', preco: '2.50', categoria: 'Gourmet', imagem: '', estoque: '20', ativo: true });
                                }} className="w-full bg-pink-600 text-white py-4 rounded-xl font-black text-[10px]">ADICIONAR SABOR</button>
                            </div>
                            {produtos.map(p => (
                                <div key={p.id} className="flex items-center gap-3 p-3 bg-gray-50 rounded-2xl mb-2">
                                    <img src={p.imagem} className="w-10 h-10 rounded-lg object-cover" />
                                    <div className="flex-1 font-black"><p className="text-[9px] uppercase">{p.nome}</p><p className="text-[8px] text-pink-600">Qtd: {p.estoque}</p></div>
                                    <button onClick={() => db.ref('produtos/'+p.id).update({ativo: !p.ativo})}>{p.ativo ? '✅' : '❌'}</button>
                                    <button onClick={() => {if(confirm("Excluir?")) db.ref('produtos/'+p.id).remove()}}>🗑️</button>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
